[main]
plugins=keyfile
# Use wpa_supplicant for Wi-Fi — gives plasma-nm full scan/connect capability.
# wpa_supplicant must be running in D-Bus mode (-u) before NM starts.
wifi.backend=wpa_supplicant
# NM manages DNS
dns=default
# NM handles DHCP internally for all managed interfaces
dhcp=internal

[ifupdown]
managed=true

[device]
# Do not randomise MAC on scan so APs are consistently visible
wifi.scan-rand-mac-address=no

[logging]
level=WARN
